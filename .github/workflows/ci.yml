name: "🔧 CI"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-validate:
    name: "✅ Lint & Validate"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect and Lint
        run: |
          # Terraform
          if ls *.tf 1>/dev/null 2>&1 || find . -name "*.tf" -maxdepth 3 | grep -q .; then
            echo "::group::Terraform Format Check"
            terraform fmt -check -recursive -diff || true
            echo "::endgroup::"
          fi

          # Python
          if ls *.py 1>/dev/null 2>&1 || find . -name "*.py" -maxdepth 3 | grep -q .; then
            echo "::group::Python Lint"
            pip install ruff 2>/dev/null
            ruff check . || true
            echo "::endgroup::"
          fi

          # Shell scripts
          if ls *.sh 1>/dev/null 2>&1 || find . -name "*.sh" -maxdepth 3 | grep -q .; then
            echo "::group::Shell Lint"
            sudo apt-get install -y shellcheck 2>/dev/null
            find . -name "*.sh" -maxdepth 3 -exec shellcheck {} + || true
            echo "::endgroup::"
          fi

          # Markdown
          if ls *.md 1>/dev/null 2>&1; then
            echo "Markdown files found — consider adding markdownlint"
          fi

          echo "✅ Linting complete"

  dotnet-integration-tests:
    name: "🧪 Integration Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build Integration Tests
        run: dotnet build tests/Ato.Copilot.Tests.Integration/ --configuration Release

      - name: Run Integration Tests
        run: |
          dotnet test tests/Ato.Copilot.Tests.Integration/Ato.Copilot.Tests.Integration.csproj \
            --configuration Release \
            --no-build \
            --logger "github" \
            --filter 'Category!=RequiresExternalService'

  vscode-extension-test:
    name: "🔌 VSCode Extension Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xvfb
        run: sudo apt-get install -y xvfb

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: extensions/vscode
        run: npm ci

      - name: Run VSCode Extension Tests (headless)
        working-directory: extensions/vscode
        run: xvfb-run -a npm test

  m365-extension-test:
    name: "📦 M365 Extension Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: extensions/m365
        run: npm ci

      - name: Run M365 Extension Tests
        working-directory: extensions/m365
        run: npm test

  dashboard-e2e-smoke:
    name: "🎭 Dashboard E2E Smoke Tests"
    runs-on: ubuntu-latest
    # TODO: Full E2E requires docker-compose stack with Azure credentials.
    # Enable this job once secrets (AZURE_OPENAI_KEY, etc.) are wired in GitHub Secrets.
    # To run locally: docker compose -f docker-compose.mcp.yml up -d --wait
    if: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright and dependencies
        working-directory: tests/dashboard-e2e
        run: npm ci && npx playwright install --with-deps chromium

      - name: Run Playwright Smoke Tests
        working-directory: tests/dashboard-e2e
        run: npx playwright test
