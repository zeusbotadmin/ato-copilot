server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy dashboard REST API (preserves /api/dashboard prefix — server expects it)
    location /api/dashboard/ {
        proxy_pass ${MCP_BASE_URL};
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    # Proxy v1 REST API (authorization packages, SAR endpoints)
    location /api/v1/ {
        proxy_pass ${MCP_BASE_URL};
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    # Proxy onboarding wizard API (Feature 047)
    location /api/onboarding/ {
        proxy_pass ${MCP_BASE_URL};
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        # Allow long-running uploads (eMASS ZIP, SSP PDF, templates)
        client_max_body_size 100m;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Proxy CSP cross-tenant API surface (Feature 048 — US7/US8/US9)
    # Covers: /api/csp/onboarding/*  (CSP self-onboarding wizard)
    #         /api/csp/dashboard/*   (cross-tenant CSP-Admin dashboard)
    #         /api/csp/inherited-components/*  (post-onboarding mgmt page)
    location /api/csp/ {
        proxy_pass ${MCP_BASE_URL};
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        # Allow long-running uploads (ATO PDF, SSP DOCX, OSCAL JSON, ZIP bundles)
        client_max_body_size 100m;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Proxy per-org tenancy API surface (Feature 048 follow-up — user ask #2)
    # Covers: /api/orgs/control-overrides/* (per-org NIST control override CRUD)
    location /api/orgs/ {
        proxy_pass ${MCP_BASE_URL};
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    # Proxy tenant impersonation surface (Feature 048 — US3/US4/US7)
    location /api/tenants {
        proxy_pass ${MCP_BASE_URL};
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    # Proxy deployment-mode probe (Feature 048 — US1)
    location /api/deployment/ {
        proxy_pass ${MCP_BASE_URL};
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    # Proxy audit-trail API (Feature 048 — US7)
    location /api/audit/ {
        proxy_pass ${MCP_BASE_URL};
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    # Proxy SignalR notification hub (WebSocket upgrade support)
    location /hubs/notifications {
        proxy_pass ${MCP_BASE_URL}/hubs/notifications;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_read_timeout 86400s;
    }

    # Proxy MCP chat/tools endpoints (strip /api prefix — server has /mcp/*)
    location /api/mcp/ {
        rewrite ^/api/mcp/(.*)$ /mcp/$1 break;
        proxy_pass ${MCP_BASE_URL};
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;

        # SSE streaming support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
    }

    # Preserve upstream redirects that land on /mcp/* paths.
    location /mcp/ {
        proxy_pass ${MCP_BASE_URL};
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
    }

    # Proxy SignalR package hub (WebSocket upgrade support)
    location /hubs/package {
        proxy_pass ${MCP_BASE_URL}/hubs/package;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_read_timeout 86400s;
    }

    # SPA fallback — serve index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache index.html so new deploys are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Cache static assets (hashed filenames make this safe)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
