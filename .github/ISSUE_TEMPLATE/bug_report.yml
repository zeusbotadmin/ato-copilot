name: 🐛 Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below.

  - type: textarea
    id: description
    attributes:
      label: 🐛 Bug Description
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ Expected Behavior
      description: What did you expect to happen?
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 🔄 Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Run '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 🖥️ Environment
      description: Relevant environment information.
      placeholder: |
        - OS: [e.g., Ubuntu 22.04]
        - Terraform Version: [e.g., 1.5.0]
        - Provider Version: [e.g., azurerm 3.70.0]
      render: markdown
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 📋 Relevant Logs / Error Output
      description: Paste any relevant log output or error messages.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 📎 Additional Context
      description: Add any other context, screenshots, or files about the bug.
    validations:
      required: false
